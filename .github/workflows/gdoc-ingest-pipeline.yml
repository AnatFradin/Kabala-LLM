name: GDoc to Wiki Pipeline

on:
  workflow_dispatch:
    inputs:
      gdoc_url:
        description: "Google Doc URL"
        required: true
        type: string
      subfolder:
        description: "Target subfolder inside raw/50-Кабала/"
        required: false
        default: "уроки с Леей"
        type: string
      title:
        description: "Custom filename without .md (optional)"
        required: false
        type: string
      create_pr:
        description: "Create PR with raw/wiki changes"
        required: false
        default: true
        type: boolean
  repository_dispatch:
    types: [gdoc_ingest]

permissions:
  contents: write
  pull-requests: write

jobs:
  gdoc-ingest:
    runs-on: ubuntu-latest
    env:
      GDOC_URL: ${{ inputs.gdoc_url || github.event.client_payload.gdoc_url }}
      SUBFOLDER: ${{ inputs.subfolder || github.event.client_payload.subfolder || 'уроки с Леей' }}
      TITLE: ${{ inputs.title || github.event.client_payload.title || '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Validate required input
        run: |
          if [ -z "${GDOC_URL}" ]; then
            echo "gdoc_url is required (workflow_dispatch input or repository_dispatch client_payload.gdoc_url)."
            exit 1
          fi

      - name: Normalize create_pr flag
        id: normalize
        env:
          CREATE_PR_INPUT: ${{ inputs.create_pr }}
          CREATE_PR_PAYLOAD: ${{ github.event.client_payload.create_pr }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          val = os.getenv("CREATE_PR_INPUT")
          if val in (None, "", "null"):
              val = os.getenv("CREATE_PR_PAYLOAD")
          if val in (None, "", "null"):
              normalized = "true"
          elif str(val).strip().lower() in {"false", "0", "no"}:
              normalized = "false"
          else:
              normalized = "true"

          Path(os.environ["GITHUB_OUTPUT"]).write_text(f"create_pr={normalized}\n", encoding="utf-8")
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare converter credentials
        env:
          CREDENTIALS_JSON: ${{ secrets.GDOC_CONVERTER_CREDENTIALS_JSON }}
          TOKEN_JSON: ${{ secrets.GDOC_CONVERTER_TOKEN_JSON }}
        run: |
          if [ -z "${CREDENTIALS_JSON}" ]; then
            echo "Secret GDOC_CONVERTER_CREDENTIALS_JSON is required."
            exit 1
          fi
          printf "%s" "${CREDENTIALS_JSON}" > tools/gdoc-converter/credentials.json
          chmod 600 tools/gdoc-converter/credentials.json
          if [ -n "${TOKEN_JSON}" ]; then
            printf "%s" "${TOKEN_JSON}" > "${HOME}/.gdoc2md_token.json"
            chmod 600 "${HOME}/.gdoc2md_token.json"
          fi

      - name: Install converter dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f tools/gdoc-converter/requirements.txt ]; then
            pip install -r tools/gdoc-converter/requirements.txt
          elif [ -f tools/gdoc-converter/pyproject.toml ] || [ -f tools/gdoc-converter/setup.py ]; then
            pip install ./tools/gdoc-converter
          else
            echo "No converter dependency manifest found in tools/gdoc-converter."
            exit 1
          fi

      - name: Convert Google Doc to raw markdown
        run: |
          if [ -n "${TITLE}" ]; then
            python tools/gdoc-converter/gdoc-to-raw.py "${GDOC_URL}" --subfolder "${SUBFOLDER}" --title "${TITLE}"
          else
            python tools/gdoc-converter/gdoc-to-raw.py "${GDOC_URL}" --subfolder "${SUBFOLDER}"
          fi

      - name: Validate CLAUDE instructions file
        run: |
          test -f CLAUDE.md || (echo "CLAUDE.md not found in repository root." && exit 1)

      - name: Run ingest agent (/ingest equivalent)
        uses: anthropics/claude-code-action@v1.0.99
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Follow CLAUDE.md (repository root) exactly.
            Treat files changed by this workflow run as the ingest scope:
            - start from git diff against the current HEAD in this runner
            - process only newly added/modified raw markdown files from this run
            Update wiki pages and indexes as needed.
            Do not modify files in raw/.
            Keep changes limited to wiki/.

      - name: Generate branch name
        id: branch
        run: |
          echo "name=automation/gdoc-ingest-$(date -u +%Y%m%d)-${GITHUB_RUN_ID}" >> "${GITHUB_OUTPUT}"

      - name: Create pull request with raw/wiki updates
        if: ${{ steps.normalize.outputs.create_pr == 'true' }}
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ steps.branch.outputs.name }}
          commit-message: "Automated gdoc ingest pipeline update"
          title: "Automated ingest: new Google Doc source"
          body: |
            ## Summary
            This PR was generated by the **GDoc to Wiki Pipeline**.

            ## Inputs
            - gdoc_url: `${{ env.GDOC_URL }}`
            - subfolder: `${{ env.SUBFOLDER }}`
            - title: `${{ env.TITLE }}`

            ## Scope
            - Converted Google Doc to `raw/`
            - Ran ingest flow to update `wiki/`
          add-paths: |
            raw/**/*.md
            wiki/*.md
            wiki/**/*.md
          draft: false
